

# This file tells YOLO where to find the dataset and what classes exist.
#
# NOTE: We use an ABSOLUTE path here (not relative) because Ultralytics
# resolves relative paths against its own global "datasets" folder
# instead of this file's location, which causes wrong paths on Windows.

# path: the base folder (everything below is relative to this)
path: D:/Projects/Data Science/ThreadEye/data/dataset

# Sub-folders for each split (relative to 'path' above)
train: images/train
val: images/val
test: images/test

# Class names - index 0 is "defect" since we treated all defect types
# as a single generic class during data_prep.
names:
  0: defect